<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Spin Game</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .auth-container, .game-container {
            max-width: 400px;
            margin: 50px auto;
            background: #162447;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(0, 255, 203, 0.3);
        }
        h1, h2 { color: #00fff3; }
        .balance-box {
            font-size: 1.2rem;
            margin-bottom: 20px;
            background: #1f4068;
            padding: 10px;
            border-radius: 8px;
        }
        .slot-machine {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 4rem;
            margin: 30px 0;
            background: #0f172a;
            padding: 20px;
            border-radius: 10px;
            border: 3px solid #e94560;
        }
        .slot-box {
            width: 80px;
            height: 90px;
            background: #1e293b;
            border-radius: 5px;
            line-height: 90px;
        }
        input {
            width: 85%;
            padding: 10px;
            font-size: 1.1rem;
            border-radius: 5px;
            border: none;
            margin-bottom: 20px;
            text-align: center;
            background: #e2e8f0;
            color: #0f172a;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            width: 90%;
            margin-bottom: 10px;
        }
        button:hover { background: #ff4866; transform: scale(1.05); }
        .btn-alt { background: #00fff3; color: #0f172a; }
        .btn-alt:hover { background: #00cccc; }
        .result-message {
            margin-top: 20px;
            font-size: 1.3rem;
            font-weight: bold;
        }
        .win { color: #4ecca3; }
        .lose { color: #e94560; }
        .hidden { display: none; }
    </style>
</head>
<body>

<!-- Login & Register Screen -->
<div id="auth-screen" class="auth-container">
    <h2 id="auth-title">LOGIN TO GAME</h2>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button id="auth-btn" onclick="handleAuth()">LOGIN</button>
    <button class="btn-alt" id="toggle-btn" onclick="toggleAuthMode()">Switch to Register</button>
    <div class="result-message" id="auth-msg"></div>
</div>

<!-- Game Main Screen -->
<div id="game-screen" class="game-container hidden">
    <h1>🎰 LUCKY SPIN 🎰</h1>
    <div class="balance-box">Welcome, <span id="user-display"></span> | Balance: <span id="balance">0</span> MMK</div>
    
    <div class="slot-machine">
        <div class="slot-box" id="slot1">🍒</div>
        <div class="slot-box" id="slot2">🍒</div>
        <div class="slot-box" id="slot3">🍒</div>
    </div>

    <div>
        <label for="betAmount">Bet Amount:</label><br>
        <input type="number" id="betAmount" value="500" min="100">
    </div>

    <button onclick="playSpin()">SPIN 🎰</button>
    <div class="result-message" id="result"></div>
</div>

<script>
    const SERVER_URL = window.location.origin;
    let playerId = "";
    let isLoginMode = true;
    const emojis = ['🍒', '🍋', '🍇', '🍉', '💎', '7️⃣'];

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "LOGIN TO GAME" : "CREATE ACCOUNT";
        document.getElementById('auth-btn').innerText = isLoginMode ? "LOGIN" : "REGISTER";
        document.getElementById('toggle-btn').innerText = isLoginMode ? "Switch to Register" : "Switch to Login";
    }

    async function handleAuth() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const msgDiv = document.getElementById('auth-msg');

        if(!username || !password) return msgDiv.innerText = "Please fill all fields!";

        const endpoint = isLoginMode ? '/api/auth/login' : '/api/auth/register';
        
        try {
            const response = await fetch(`${SERVER_URL}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();

            if (data.success) {
                if (isLoginMode) {
                    playerId = data.playerId;
                    document.getElementById('user-display').innerText = data.username;
                    document.getElementById('balance').innerText = data.balance;
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('game-screen').classList.remove('hidden');
                } else {
                    msgDiv.innerText = "Registration successful! Now Please Login.";
                    msgDiv.className = "result-message win";
                    toggleAuthMode();
                }
            } else {
                msgDiv.innerText = data.message;
                msgDiv.className = "result-message lose";
            }
        } catch (e) {
            msgDiv.innerText = "Connection Error!";
        }
    }

    async function playSpin() {
        const betAmount = parseInt(document.getElementById('betAmount').value);
        const resultDiv = document.getElementById('result');
        
        resultDiv.innerText = "Spinning... 🎰";
        resultDiv.className = "result-message";

        let interval = setInterval(() => {
            document.getElementById('slot1').innerText = emojis[Math.floor(Math.random() * emojis.length)];
            document.getElementById('slot2').innerText = emojis[Math.floor(Math.random() * emojis.length)];
            document.getElementById('slot3').innerText = emojis[Math.floor(Math.random() * emojis.length)];
        }, 100);

        try {
            const response = await fetch(`${SERVER_URL}/api/game/spin`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ playerId, betAmount })
            });

            const data = await response.json();
            clearInterval(interval); 

            if (response.status !== 200) {
                resultDiv.innerText = data.message || "Error!";
                resultDiv.className = "result-message lose";
                return;
            }

            document.getElementById('balance').innerText = data.newBalance;

            if (data.result === "WIN") {
                document.getElementById('slot1').innerText = '💎';
                document.getElementById('slot2').innerText = '💎';
                document.getElementById('slot3').innerText = '💎';
                resultDiv.innerText = `🎉 YOU WIN! +${data.winAmount} MMK`;
                resultDiv.className = "result-message win";
            } else {
                document.getElementById('slot1').innerText = '🍒';
                document.getElementById('slot2').innerText = '🍋';
                document.getElementById('slot3').innerText = '🍉';
                resultDiv.innerText = `❌ YOU LOSE! -${betAmount} MMK`;
                resultDiv.className = "result-message lose";
            }

        } catch (error) {
            clearInterval(interval);
            resultDiv.innerText = "Server Connection Failed!";
            resultDiv.className = "result-message lose";
        }
    }
</script>

</body>
</html>
