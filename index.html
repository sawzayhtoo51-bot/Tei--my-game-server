<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Lucky Spin</title>
    <style>
        body {
            background: radial-gradient(circle, #1a0b2e 0%, #080314 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .auth-container, .game-container {
            max-width: 420px;
            margin: 40px auto;
            background: linear-gradient(145deg, #130724, #1f0d3a);
            padding: 35px 25px;
            border-radius: 24px;
            border: 2px solid #ffd700;
            box-shadow: 0px 0px 35px rgba(255, 215, 0, 0.2);
        }
        h1, h2 {
            font-size: 2.2rem;
            background: linear-gradient(to right, #fff7ad, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
            margin-top: 0;
            letter-spacing: 2px;
        }
        .balance-box {
            font-size: 1.1rem;
            margin-bottom: 25px;
            background: rgba(255, 215, 0, 0.1);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #fff3a1;
        }
        .slot-machine {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 4.5rem;
            margin: 25px 0;
            background: #05020a;
            padding: 25px 15px;
            border-radius: 20px;
            border: 3px double #ffd700;
            box-shadow: inset 0px 0px 20px rgba(0,0,0,0.9);
        }
        .slot-box {
            width: 90px;
            height: 100px;
            background: linear-gradient(180deg, #2c144d, #140726);
            border-radius: 12px;
            line-height: 100px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        input {
            width: 85%;
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 30px;
            border: 2px solid #ffd700;
            margin-bottom: 20px;
            text-align: center;
            background: #0f061c;
            color: #ffffff;
            outline: none;
        }
        label {
            font-size: 1rem;
            color: #ffd700;
            font-weight: bold;
            letter-spacing: 1px;
        }
        button {
            background: linear-gradient(180deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0px 6px 20px rgba(255, 75, 43, 0.4);
            width: 90%;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-alt {
            background: transparent;
            color: #ffd700;
            border: 2px solid #ffd700;
            box-shadow: none;
        }
        .result-message {
            margin-top: 22px;
            font-size: 1.4rem;
            font-weight: bold;
            min-height: 35px;
        }
        .win { color: #00ff88; }
        .lose { color: #ff4b2b; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="auth-screen" class="auth-container">
    <h2 id="auth-title">CASINO LOGIN</h2>
    <input type="text" id="username" placeholder="Enter Username"><br>
    <input type="password" id="password" placeholder="Enter Password"><br>
    <button id="auth-btn" onclick="handleAuth()">LOGIN</button>
    <button class="btn-alt" id="toggle-btn" onclick="toggleAuthMode()">REGISTER ACCOUNT</button>
    <div class="result-message" id="auth-msg"></div>
</div>

<div id="game-screen" class="game-container hidden">
    <h1>👑 ROYAL SPIN 👑</h1>
    <div class="balance-box">User: <span id="user-display" style="color:#ffd700;"></span> | Balance: <span id="balance" style="color:#00ff88; font-weight:bold;">0</span> MMK</div>
    
    <div class="slot-machine">
        <div class="slot-box" id="slot1">💰</div>
        <div class="slot-box" id="slot2">💰</div>
        <div class="slot-box" id="slot3">💰</div>
    </div>

    <div>
        <label for="betAmount">SELECT BET (MMK)</label><br><br>
        <input type="number" id="betAmount" value="500" min="100">
    </div>

    <button onclick="playSpin()">SPIN NOW 🎰</button>
    <div class="result-message" id="result"></div>
</div>

<script>
    const SERVER_URL = window.location.origin;
    let playerId = "";
    let isLoginMode = true;
    const emojis = ['🍒', '👑', '💰', '🍉', '💎', '7️⃣'];

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "CASINO LOGIN" : "CREATE ACCOUNT";
        document.getElementById('auth-btn').innerText = isLoginMode ? "LOGIN" : "REGISTER";
        document.getElementById('toggle-btn').innerText = isLoginMode ? "REGISTER ACCOUNT" : "Back to Login";
        document.getElementById('auth-msg').innerText = "";
    }

    async function handleAuth() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const msgDiv = document.getElementById('auth-msg');

        if(!username || !password) {
            msgDiv.innerText = "Please fill all fields!";
            return;
        }

        const endpoint = isLoginMode ? '/api/auth/login' : '/api/auth/register';
        msgDiv.innerText = isLoginMode ? "Connecting..." : "Creating...";
        
        try {
            const response = await fetch(`${SERVER_URL}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();

            if (data.success) {
                if (isLoginMode) {
                    playerId = data.playerId;
                    document.getElementById('user-display').innerText = data.username;
                    document.getElementById('balance').innerText = data.balance;
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('game-screen').classList.remove('hidden');
                } else {
                    msgDiv.innerText = "Account Created! Please Login Now.";
                    msgDiv.className = "result-message win";
                    toggleAuthMode();
                }
            } else {
                msgDiv.innerText = data.message;
                msgDiv.className = "result-message lose";
            }
        } catch (e) {
            msgDiv.innerText = "Server Error!";
            msgDiv.className = "result-message lose";
        }
    }

    async function playSpin() {
        const betAmount = parseInt(document.getElementById('betAmount').value);
        const resultDiv = document.getElementById('result');
        
        resultDiv.innerText = "GOOD LUCK... 🎰";
        resultDiv.className = "result-message";

        const s1 = document.getElementById('slot1');
        const s2 = document.getElementById('slot2');
        const s3 = document.getElementById('slot3');

        let interval = setInterval(() => {
            s1.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            s2.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            s3.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        }, 80);

        try {
            const response = await fetch(`${SERVER_URL}/api/game/spin`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ playerId, betAmount })
            });

            const data = await response.json();
            clearInterval(interval); 

            if (response.status !== 200) {
                resultDiv.innerText = data.message || "Error!";
                resultDiv.className = "result-message lose";
                return;
            }

            document.getElementById('balance').innerText = data.newBalance;

            if (data.result === "WIN") {
                s1.innerText = '💎';
                s2.innerText = '💎';
                s3.innerText = '💎';
                resultDiv.innerText = `BAG WIN! +${data.winAmount} MMK`;
                resultDiv.className = "result-message win";
            } else {
                s1.innerText = '🍒';
                s2.innerText = '👑';
                s3.innerText = '🍉';
                resultDiv.innerText = `TRY AGAIN! -${betAmount} MMK`;
                resultDiv.className = "result-message lose";
            }

        } catch (error) {
            clearInterval(interval);
            resultDiv.innerText = "Connection Failed!";
            resultDiv.className = "result-message lose";
        }
    }
</script>

</body>
</html>
