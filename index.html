<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOUBLE QUEENS - Premium Lobby</title>
    <style>
        body {
            background-color: #0b0214;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .auth-container {
            max-width: 400px;
            margin: 80px auto;
            background: linear-gradient(145deg, #130724, #1f0d3a);
            padding: 35px 25px;
            border-radius: 24px;
            border: 2px solid #ffd700;
            box-shadow: 0px 0px 35px rgba(255, 215, 0, 0.2);
        }
        input {
            width: 85%; padding: 12px; font-size: 1.1rem; border-radius: 30px;
            border: 2px solid #ffd700; margin-bottom: 20px; text-align: center;
            background: #0f061c; color: #ffffff; outline: none;
        }
        button {
            background: linear-gradient(180deg, #ff416c, #ff4b2b); color: white;
            border: none; padding: 14px 30px; font-size: 1.2rem; font-weight: bold;
            border-radius: 30px; cursor: pointer; width: 90%; margin-bottom: 10px;
        }
        .btn-alt { background: transparent; color: #ffd700; border: 2px solid #ffd700; }
        
        .lobby-container {
            max-width: 480px;
            margin: auto;
            background: #110521;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .header-bar {
            background: #1c0835;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffd700;
        }
        .logo-text { font-size: 1.5rem; font-weight: bold; color: #ffd700; }
        .user-info { color: #00ff88; font-weight: bold; }
        
        .banner-box {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://unsplash.com');
            background-size: cover;
            background-position: center;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            border-bottom: 1px solid #ffd700;
        }

        .category-bar {
            display: flex;
            justify-content: space-around;
            background: #17072c;
            padding: 10px 0;
            font-size: 0.9rem;
            color: #bfa0ff;
        }
        .cat-item.active { color: #ffd700; font-weight: bold; border-bottom: 2px solid #ffd700; }

        .games-section { padding: 15px; text-align: left; }
        .section-title { font-size: 1.1rem; color: #ffd700; margin-bottom: 10px; font-weight: bold; }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .game-card {
            background: #1e0c33;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.2);
            cursor: pointer;
            position: relative;
        }
        .game-card img { width: 100%; height: 130px; object-fit: cover; display: block; }
        .game-title { padding: 8px; font-size: 0.9rem; text-align: center; font-weight: bold; background: #130524; }
        .hot-badge {
            position: absolute; top: 5px; right: 5px; background: red;
            color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; font-weight: bold;
        }

        .page-content {
            padding: 20px 15px;
            text-align: left;
        }
        .payment-box {
            background: #1e0c33;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        .pay-info {
            background: #130524;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.95rem;
            border-left: 4px solid #ffd700;
        }

        .footer-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px; background: #1c0835;
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 2px solid #ffd700;
            z-index: 100;
        }
        .nav-item { color: #a594bd; font-size: 0.85rem; cursor: pointer; }
        .nav-item.active { color: #ffd700; font-weight: bold; }

        .hidden { display: none; }

        /* ===== Room Selection CSS ===== */
        .room-screen-container {
            max-width: 480px;
            margin: auto;
            background: #0b0214;
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .station-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 15px;
        }

        .station {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 10px;
            padding: 8px 12px;
        }

        .player-seat {
            width: 100px;
            height: 70px;
            background: #2a1145;
            border: 2px solid #ffd700;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00ff88;
            font-size: 11px;
            font-weight: bold;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.2);
        }

        .player-seat.empty {
            background: rgba(0, 0, 0, 0.4);
            border: 2px dashed #666;
            color: #777;
            box-shadow: none;
        }

        .slot-machine {
            width: 130px;
            height: 70px;
            background: #222;
            border: 2px solid #ffcc00;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 3px;
        }

        .machine-logo {
            background: #ff0055;
            color: #fff;
            font-size: 8px;
            font-weight: bold;
            width: 100%;
            text-align: center;
            padding: 1px 0;
        }

        .machine-screen {
            background: #333;
            width: 100%;
            height: 40px;
            border: 1px solid #ffcc00;
            background-image: repeating-linear-gradient(0deg, #333, #333 2px, #444 2px, #444 4px);
        }

        .back-btn {
            background: #ff0055;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: bold;
        }

        .room-selector-box {
            position: absolute;
            bottom: 90px;
            right: 15px;
            width: 160px;
            background: #110222;
            border: 2px solid #ffd700;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
            z-index: 50;
        }

        .selector-header {
            background: #ff416c;
            color: white;
            text-align: center;
            padding: 6px 5px;
            font-size: 11px;
            font-weight: bold;
        }

        .room-list {
            max-height: 140px;
            overflow-y: scroll;
        }

        .room-list::-webkit-scrollbar { width: 6px; }
        .room-list::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 3px; }
        .room-list::-webkit-scrollbar-track { background: #1a0830; }

        .room-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 10px;
            color: #fff;
            font-size: 12px;
            border-bottom: 1px solid #2a1145;
            cursor: pointer;
        }

        .room-item:hover { background: #2a0f4d; }
        .room-item.active { background: #ff4b2b; color: white; font-weight: bold; }
        .room-status { color: #00ff88; }
        .room-status.full { color: #ff3333; }
    </style>
</head>
<body>

<!-- ၁။ Login / Register Screen -->
<div id="auth-screen" class="auth-container">
    <h2 id="auth-title">DOUBLE QUEENS LOGIN</h2>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button id="auth-btn" onclick="handleAuth()">LOGIN</button>
    <button class="btn-alt" id="toggle-btn" onclick="toggleAuthMode()">Register Account</button>
    <div style="margin-top:15px; font-weight:bold;" id="auth-msg"></div>
</div>

<!-- ၂။ Lobby Main Screen Container -->
<div id="lobby-screen" class="lobby-container hidden">
    
    <div class="header-bar">
        <div class="logo-text">DOUBLE QUEENS</div>
        <div class="user-info"><span id="user-display" style="color:white;"></span> | <span id="balance">0</span> Ks</div>
    </div>

    <!-- HOME TAB CONTENT -->
    <div id="tab-home">
        <div class="banner-box">
            WELCOME TO DOUBLE QUEENS
        </div>

        <div class="category-bar">
            <div class="cat-item active">Popular</div>
            <div class="cat-item">Slots</div>
            <div class="cat-item">Cards</div>
            <div class="cat-item">Fish</div>
        </div>

        <div class="games-section">
            <div class="section-title">🔥 Hot Games</div>
